name: CI

on:
  push:
    branches: [main, master, 'feature/**', 'cursor/**']
  pull_request:
    branches: [main, master, 'feature/**']

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  localshop-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LocalShop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: LocalShop/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
